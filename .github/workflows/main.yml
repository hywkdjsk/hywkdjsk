الاسم: RDP 

على: 
  workflow_dispatch: 

المهام: 
  secure-rdp: 
    يعمل على: windows-latest 
    مهلة الدقائق: 3600 

    الخطوات: 
      - الاسم: تكوين إعدادات RDP الأساسية 
        التشغيل: | 
          # تفعيل سطح المكتب البعيد وتعطيل مصادقة مستوى الشبكة (إذا لزم الأمر) 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' ` 
                             -Name "fDenyTSConnections" -Value 0 -Force 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' ` 
                             -Name "UserAuthentication" -Value 0 -Force 
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' ` 
                             -Name "SecurityLayer" -Value 0 -Force 

          # إزالة أي قاعدة موجودة بنفس الاسم لتجنب التكرار 
          netsh advfirewall firewall delete rule name="RDP-Tailscale" 
          
          # للاختبار، اسمح بأي اتصال وارد على المنفذ 3389 
          netsh advfirewall firewall add rule name="RDP-Tailscale" ` 
            dir=in action=allow protocol=TCP localport=3389 

          # (اختياري) أعد تشغيل خدمة سطح المكتب البعيد لضمان تطبيق التغييرات 
          Restart-Service -Name TermService -Force 

      - name: Create RDP User with Secure Password 
        run: | 
          أضف النوع -اسم التجميع System.Security 
          $charSet = @{ 
              Upper = [char[]](65..90) # AZ 
              Lower = [char[]](97..122) # az 
              Number = [char[]](48..57) # 0-9 
              Special = ([char[]](33..47) + [char[]](58..64) + 
                         [char[]](91..96) + [char[]](123..126)) # أحرف خاصة 
          } 
          $rawPassword = @() 
          $rawPassword += $charSet.Upper | Get-Random -Count 4 
          $rawPassword += $charSet.Lower | Get-Random -Count 4 
          $rawPassword += $charSet.Number | Get-Random -Count 4 
          $rawPassword += $charSet.Special | استخدم الأمر Get-Random مع تحديد عدد العناصر (4 
          ) لإنشاء كلمة مرور عشوائية. ثم قم بفرز كلمة المرور الخام باستخدام الأمر Get-Random. بعد ذلك، 
          قم بتحويل كلمة المرور إلى سلسلة آمنة باستخدام الأمر ConvertTo-SecureString. أنشئ 
          مستخدمًا محليًا جديدًا باسم "RDP" باستخدام كلمة المرور "SecurePass ". 
          أضف عضوًا إلى المجموعة المحلية "Administrators" وعضوًا 
          إلى المجموعة "Remote Desktop Users".
          
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV 
          
          if (-not (Get-LocalUser -Name "RDP")) { 
              Write-Error "فشل إنشاء المستخدم" 
              exit 1 
          } 

      - name: تثبيت Tailscale 
        run: | 
          $tsUrl = " https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi " 
          $installerPath = "$env:TEMP ailscale.msi" 
          
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath 
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait 
          Remove-Item $installerPath -Force 

      - name: إنشاء اتصال Tailscale 
        run: | 
          # تشغيل Tailscale باستخدام مفتاح المصادقة المُقدّم وتعيين اسم مضيف فريد 
          & "$env:ProgramFiles\Tailscale ailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID 
          
          # انتظار Tailscale لتخصيص عنوان IP 
          $tsIP = $null 
          $retries = 0 
          while (-not $tsIP -and $retries -lt 10) { 
              $tsIP = & "$env:ProgramFiles\Tailscale ailscale.exe" ip -4 
              Start-Sleep -Seconds 5 
              $retries++ 
          } 
          
          if (-not $tsIP) { 
              Write-Error "لم يتم تخصيص عنوان IP لـ Tailscale. جارٍ الخروج." 
              exit 1 
          } 
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV 
      
      - name: Verify RDP Accessibility 
        run: | 
          Write-Host "عنوان IP الخاص بـ Tailscale: $env:TAILSCALE_IP" 
          
          # اختبار الاتصال باستخدام Test-NetConnection مع عنوان IP الخاص بـ Tailscale على المنفذ 3389 
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389 
          if (-not $testResult.TcpTestSucceeded) { 
              Write-Error "فشل اتصال TCP بمنفذ RDP 3389" 
              exit 1 
          } 
          Write-Host "تم الاتصال بنجاح!" 

      - name: Maintain Connection 
        run: | 
          Write-Host "`n=== RDP ACCESS ===" 
          Write-Host "العنوان: $env:TAILSCALE_IP" 
          Write-Host "اسم المستخدم: RDP" 
          Write-Host "كلمة المرور: $(echo $env:RDP_CREDS)" 
          Write-Host "==================`n" 
          
          # إبقاء المُشغِّل نشطًا إلى أجل غير مسمى (أو حتى يتم إلغاؤه يدويًا) 
          while ($true) { 
              Write-Host "[$(Get-Date)] RDP نشط - استخدم Ctrl+C في سير العمل لإنهاء العملية" 
              Start-Sleep -Seconds 300
          }
